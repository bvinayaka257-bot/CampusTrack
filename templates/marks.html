<!DOCTYPE html>
<html>

<body>


<h1>Enter Marks</h1>


<form method="POST">


<select name="student_id">

{% for s in students %}

<option value="{{s[0]}}">
{{s[1]}}
</option>

{% endfor %}

</select>



<select name="subject_id">


{% for s in subjects %}

<option value="{{s[0]}}">
{{s[1]}}
</option>

{% endfor %}


</select>



<input name="marks" placeholder="Marks">


<button>
Save Marks
</button>


</form>



<h2>Marks List</h2>


<table border="1">

<tr>

<th>Student</th>
<th>Subject</th>
<th>Marks</th>

</tr>


{% for m in marks %}

<tr>

<td>{{m[0]}}</td>

<td>{{m[1]}}</td>

<td>{{m[2]}}</td>


</tr>

{% endfor %}


</table>
<br><br>

<a href="/">
<button>
Back to Dashboard
</button>
</a>


</body>

</html>
