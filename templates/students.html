<!DOCTYPE html>
<html>

<body>

<h1>CampusTrack - Students</h1>

<h2>Add Student</h2>

<form method="POST">

<input name="name" placeholder="Student Name">
<br><br>

<input name="roll" placeholder="Roll Number">
<br><br>

<input name="department" placeholder="Department">
<br><br>

<input name="semester" placeholder="Semester">
<br><br>

<button>Add Student</button>

</form>

<hr>

<h2>Search Student</h2>

<form method="GET" action="/students">

<input name="search" placeholder="Search by name, roll, department">

<button>Search</button>

</form>

<hr>

<h2>Student List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Department</th>
<th>Semester</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>
<td>
<a href="/edit/{{s[0]}}">Edit</a>
|
<a href="/delete/{{s[0]}}">Delete</a>
</tr>

{% endfor %}

</table>

<br>

<a href="/">
<button>Dashboard</button>
</a>

</body>

</html>
